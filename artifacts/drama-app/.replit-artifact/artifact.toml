kind = "web"
previewPath = "/"
title = "DramaShort"
version = "1.0.0"
id = "artifacts/drama-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20685

[services.development]
run = "pnpm --filter @workspace/drama-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/drama-app", "run", "build" ]
publicDir = "artifacts/drama-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20685"
BASE_PATH = "/"
